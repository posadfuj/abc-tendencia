# Configuración del panel sin código (Sveltia CMS)
# ⚠️ Cambia "repo" por tu-usuario-de-github/nombre-del-repo cuando lo subas.
backend:
  name: github
  repo: TU-USUARIO/abc-tendencia
  branch: main

# Idioma del panel
locale: es

# Dónde se guardan las fotos que subas
media_folder: 'public/img/productos'
public_folder: '/img/productos'

collections:
  - name: productos
    label: 'Peluches y productos'
    label_singular: 'Producto'
    description: 'Agrega, edita u oculta tus peluches. Los cambios aparecen en la web en 1-2 minutos.'
    folder: 'src/data/productos'
    create: true
    slug: '{{slug}}'
    extension: md
    format: yaml-frontmatter
    summary: '{{fields.nombre}} — S/ {{fields.precio}}'
    sortable_fields: ['orden', 'nombre', 'precio']
    fields:
      - { label: 'Nombre del peluche', name: 'nombre', widget: 'string' }
      - { label: 'Foto', name: 'imagen', widget: 'image', required: false, hint: 'Sube una foto cuadrada y con buena luz.' }
      - { label: 'Precio de venta (S/)', name: 'precio', widget: 'number', value_type: 'float', min: 0 }
      - { label: 'Precio antes (para mostrar oferta)', name: 'precioAntes', widget: 'number', value_type: 'float', required: false, hint: 'Déjalo vacío si no está en oferta.' }
      - { label: 'Categoría', name: 'categoria', widget: 'select', options: ['Peluches', 'Novedades'], default: 'Peluches' }
      - { label: 'Stock (cantidad)', name: 'stock', widget: 'number', value_type: 'int', default: 1, min: 0 }
      - { label: '¿Destacado / Viral? 🔥', name: 'destacado', widget: 'boolean', default: false }
      - { label: '¿Mostrar en la web?', name: 'activo', widget: 'boolean', default: true }
      - { label: 'Orden (menor = primero)', name: 'orden', widget: 'number', value_type: 'int', default: 0 }
      - { label: 'Descripción', name: 'body', widget: 'markdown', required: false }
